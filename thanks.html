<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thank You | Kadyan Home Textile</title>

<link rel="stylesheet" href="css/style.css">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f8f6f2;
}

.thanks{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.box{
    max-width:700px;
    background:#fff;
    padding:60px;
    border-radius:16px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.box h1{
    color:#1f2d45;
    font-size:42px;
    margin-bottom:20px;
}

.box p{
    font-size:18px;
    line-height:1.8;
    color:#555;
}

.btn{
    display:inline-block;
    margin-top:35px;
    background:#c89a2b;
    color:#fff;
    padding:15px 35px;
    text-decoration:none;
    border-radius:8px;
    font-weight:600;
    transition:.3s;
}

.btn:hover{
    background:#b4861f;
}
</style>
<link rel="icon" type="image/png" href="images/favicon.png">
</head>

<body>

<div class="thanks">

<div class="box">

<h1>Thank You!</h1>

<p>

</p>

<p>
Our team will review your requirements and contact you within 24 hours.
</p>

<a href="index.html" class="btn">
Return to Home
</a>

</div>

</div>

</html>
